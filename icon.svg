<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="armor-v3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#181a26"/><stop offset="100%" stop-color="#08090e"/>
    </linearGradient>
    <linearGradient id="plate-v3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121420"/><stop offset="100%" stop-color="#080910"/>
    </linearGradient>
    <filter id="glow-v3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/><feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="115" fill="url(#armor-v3)"/>
  <rect width="500" height="500" x="6" y="6" rx="109" fill="none" stroke="#282c42" stroke-width="6"/>
  
  <g fill="#06070c" stroke="#3a4058" stroke-width="3">
    <circle cx="64" cy="64" r="14"/><circle cx="64" cy="64" r="6" fill="#181a26"/>
    <circle cx="448" cy="64" r="14"/><circle cx="448" cy="64" r="6" fill="#181a26"/>
    <circle cx="64" cy="448" r="14"/><circle cx="64" cy="448" r="6" fill="#181a26"/>
    <circle cx="448" cy="448" r="14"/><circle cx="448" cy="448" r="6" fill="#181a26"/>
  </g>
  
  <rect x="48" y="86" width="416" height="340" rx="18" fill="url(#plate-v3)" stroke="#040508" stroke-width="5"/>
  <rect x="51" y="89" width="410" height="334" rx="15" fill="none" stroke="#1f2436" stroke-width="2"/>

  <!-- Solid Royal Blue Banner -->
  <path d="M 48 104 Q 48 88, 64 88 L 448 88 Q 464 88, 464 104 L 464 146 L 48 146 Z" fill="#0044cc"/>
  <text x="256" y="127" font-family="Impact, 'Arial Black', -apple-system, sans-serif" font-size="34" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="6">PRO AV</text>
  
  <!-- REZolator: Sky Blue REZ + White olator -->
  <text x="256" y="232" font-family="-apple-system, BlinkMacSystemFont, Impact, 'Arial Black', sans-serif" font-size="64" font-weight="900" text-anchor="middle" letter-spacing="1" filter="drop-shadow(0px 4px 8px rgba(0,0,0,0.9))">
    <tspan fill="#4facfe">REZ</tspan><tspan fill="#ffffff">olator</tspan>
  </text>

  <!-- Sapphire to Sky Blue LED Meter -->
  <g transform="translate(86, 264)">
    <rect x="0" y="0" width="28" height="14" rx="2" fill="#001b48" filter="url(#glow-v3)"/>
    <rect x="34" y="0" width="28" height="14" rx="2" fill="#00246b" filter="url(#glow-v3)"/>
    <rect x="68" y="0" width="28" height="14" rx="2" fill="#00246b" filter="url(#glow-v3)"/>
    <rect x="102" y="0" width="28" height="14" rx="2" fill="#003580" filter="url(#glow-v3)"/>
    <rect x="136" y="0" width="28" height="14" rx="2" fill="#003580" filter="url(#glow-v3)"/>
    <rect x="170" y="0" width="28" height="14" rx="2" fill="#004fd6" filter="url(#glow-v3)"/>
    <rect x="204" y="0" width="28" height="14" rx="2" fill="#004fd6" filter="url(#glow-v3)"/>
    <rect x="238" y="0" width="28" height="14" rx="2" fill="#3388ff" filter="url(#glow-v3)"/>
    <rect x="272" y="0" width="28" height="14" rx="2" fill="#4facfe" filter="url(#glow-v3)"/>
    <rect x="306" y="0" width="28" height="14" rx="2" fill="#4facfe" opacity="0.25"/>
  </g>

  <rect x="70" y="304" width="372" height="84" rx="10" fill="#04050a" stroke="#0044cc" stroke-width="2.5"/>
  <text x="256" y="340" font-family="monospace, -apple-system, sans-serif" font-size="28" font-weight="800" fill="#4facfe" text-anchor="middle" letter-spacing="3">BANDWIDTH</text>
  <text x="256" y="372" font-family="monospace, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="4">CALCULATOR</text>
  
  <text x="256" y="412" font-family="monospace" font-size="12" font-weight="600" fill="#3f486c" text-anchor="middle" letter-spacing="3">EDID // FRL // TMDS // SPEC 2.0</text>
  <circle cx="90" cy="408" r="4" fill="#1f2436"/><circle cx="422" cy="408" r="4" fill="#1f2436"/>
</svg>
