<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="slick-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141417"/>
      <stop offset="100%" stop-color="#050507"/>
    </linearGradient>
    <linearGradient id="neon-wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe"/>
      <stop offset="50%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00ff87"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Obsidian Base Squircle -->
  <rect width="512" height="512" rx="115" fill="url(#slick-bg)"/>
  <rect width="508" height="508" x="2" y="2" rx="113" fill="none" stroke="#2c2c30" stroke-width="2"/>
  
  <!-- Subtle Outer Hairline Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>
  
  <!-- Glowing Precision Signal Wave -->
  <path d="M 76 256 Q 166 120, 256 256 T 436 256" fill="none" stroke="url(#neon-wave)" stroke-width="16" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 76 256 Q 166 120, 256 256 T 436 256" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Live Signal Status LED -->
  <circle cx="390" cy="110" r="8" fill="#30d158" filter="url(#glow)"/>
  <circle cx="390" cy="110" r="4" fill="#ffffff"/>

  <!-- Ultra-Clean Typography -->
  <text x="90" y="410" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="64" font-weight="800" fill="#ffffff" letter-spacing="-2">BW</text>
  <text x="210" y="410" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif" font-size="64" font-weight="200" fill="#8e8e93" letter-spacing="-2">CALC</text>
</svg>
